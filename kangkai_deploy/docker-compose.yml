version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: kangkai-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Kangkai@2026
      MYSQL_DATABASE: kang_kai_manage
      MYSQL_CHARSET: utf8mb4
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: kangkai-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/kang_kai_manage?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Kangkai@2026
    depends_on:
      - mysql

  nginx:
    image: nginx:1.25
    container_name: kangkai-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  mysql_data:
