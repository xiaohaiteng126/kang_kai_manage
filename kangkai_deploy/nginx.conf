# Nginx - 前端 + API 代理
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API 反向代理到后端容器
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vue History 模式
    location / {
        try_files $uri $uri/ /index.html;
    }
}
